<!DOCTYPE html>
<html>
<head>
    <title>Edit important words</title>
</head>
<body>

<div class="header">
    Created by Mykhailo Vinnichuk (personal tool)
</div>

<h1>Edit important words</h1>

<p>
    <b>Ticket:</b>
    <span th:text="${ticket.number}"></span>
</p>

<p>
    <b>Title:</b>
    <span th:text="${ticket.title}"></span>
</p>

<p>
    <b>Description:</b>
</p>

<div style="border:1px solid #ccc; padding:10px; margin-bottom:15px;">
    <pre th:text="${ticket.description}"
         style="white-space: pre-wrap;"></pre>
</div>

<form method="post"
      th:action="@{/tickets/{number}/edit(number=${ticket.number})}">

    <label for="importantWords">Important words:</label>
    <br>

    <input type="hidden"
           name="originalWebSite"
           th:value="${originalWebSite}">

    <textarea id="importantWords"
              name="importantWords"
              rows="4"
              cols="80"
              th:text="${ticket.importantWords}"></textarea>

    <br><br>

    <button type="submit">Save</button>
</form>

</body>
</html>

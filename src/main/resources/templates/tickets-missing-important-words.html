<!DOCTYPE html>
<html>
<head>
    <title>Tickets missing important words</title>
</head>
<body>

<div class="header">
    Created by Mykhailo Vinnichuk (personal tool)
</div>

<h1>Tickets missing important words</h1>

<form method="get" action="/tickets/missing-important-words">
    <label for="originalWebSite">Original website prefix:</label>
    <input id="originalWebSite"
           name="originalWebSite"
           type="text"
           size="60"
           th:value="${originalWebSite}">
    <button type="submit">Apply</button>
</form>

<br>

<table border="1" cellpadding="6">
    <tr>
        <th>Number</th>
        <th>Action</th>
        <th>Title</th>
        <th>Description</th>
    </tr>

    <tr th:each="ticket : ${tickets}">
        <td>
            <a th:if="${originalWebSite != null and !originalWebSite.isBlank()}"
               th:href="${originalWebSite + ticket.number}"
               th:text="${ticket.number}"
               target="_blank"></a>

            <span th:if="${originalWebSite == null or originalWebSite.isBlank()}"
                  th:text="${ticket.number}"></span>
        </td>

        <td>
            <a th:href="@{/tickets/{number}/edit(
                    number=${ticket.number},
                    originalWebSite=${originalWebSite}
                )}">
                Edit
            </a>
        </td>

        <td th:text="${ticket.title}"></td>

        <td th:text="${ticket.description}"></td>
    </tr>
</table>

</body>
</html>
